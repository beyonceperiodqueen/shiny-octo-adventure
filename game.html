<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cosmic Cutie Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0020;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #gameContainer {
      position: relative;
      width: 100%;
      max-width: 500px;
    }
    canvas {
      display: block;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 0 40px #ff69b4, 0 0 80px #ff1493;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 16px;
      pointer-events: none;
    }
    .score-box {
      background: rgba(255,105,180,0.3);
      border: 2px solid #ff69b4;
      border-radius: 12px;
      padding: 6px 14px;
      color: #fff;
      font-size: 18px;
      text-shadow: 0 0 8px #ff69b4;
    }
  </style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div class="score-box">🍭 <span id="scoreDisplay">0</span></div>
    <div class="score-box">Best: <span id="highScore">0</span></div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 500;
canvas.height = 300;

const HOT_PINK = '#ff1493';
const PINK = '#ff69b4';
const BRIDGE_DURATION = 20 * 60; // 20 seconds at 60fps

let state = 'start';
let score = 0;
let highScore = 0;
let frame = 0;
let speed = 4;
let bridgeActive = false;
let bridgeTimer = 0;

const pony = {
  x: 80, y: 200, w: 50, h: 50,
  vy: 0, onGround: true, jumps: 0,
  dead: false, deathFrame: 0,
};

let platforms = [];
let candies = [];
let cottonCandies = [];
let stars = [];
let deathParticles = [];

// ---- STARS ----
function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.75,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.5 + 0.1,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}

function drawStars() {
  stars.forEach(s => {
    s.x -= s.speed * (speed / 4);
    if (s.x < 0) { s.x = canvas.width; s.y = Math.random() * canvas.height * 0.75; }
    s.twinkle += 0.05;
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,220,255,${alpha})`;
    ctx.fill();
  });
}

// ---- PLATFORMS ----
function spawnPlatform() {
  const last = platforms[platforms.length - 1];
  const lastX = last ? last.x + last.w : canvas.width;
  const gap = 90 + Math.random() * 70 + (speed - 4) * 8;
  const w = 100 + Math.random() * 130;
  platforms.push({ x: lastX + gap, y: 250, w, h: 30 });
}

function initPlatforms() {
  platforms = [];
  platforms.push({ x: 0, y: 250, w: 320, h: 30 });
  for (let i = 0; i < 6; i++) spawnPlatform();
}

function drawPlatforms() {
  platforms.forEach(p => {
    ctx.shadowColor = HOT_PINK;
    ctx.shadowBlur = 12;
    ctx.fillStyle = PINK;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    for (let dx = 0; dx < p.w; dx += 16) ctx.fillRect(p.x + dx, p.y, 8, p.h);
  });
}

function drawBridges() {
  if (!bridgeActive) return;
  for (let i = 0; i < platforms.length - 1; i++) {
    const a = platforms[i], b = platforms[i + 1];
    const gapX = a.x + a.w, gapW = b.x - gapX;
    if (gapW > 0 && gapX < canvas.width && b.x > 0) {
      ctx.fillStyle = 'rgba(255,182,193,0.55)';
      ctx.shadowColor = PINK;
      ctx.shadowBlur = 10;
      ctx.fillRect(gapX, a.y, gapW, a.h);
      ctx.shadowBlur = 0;
      // sparkle
      ctx.font = '10px serif';
      ctx.textAlign = 'center';
      for (let dx = 6; dx < gapW; dx += 16) {
        if ((frame + dx * 3) % 30 < 15) ctx.fillText('✨', gapX + dx, a.y + 18);
      }
    }
  }
}

// ---- COLLECTIBLES ----
function spawnCandy() {
  const p = platforms[Math.floor(Math.random() * (platforms.length - 1)) + 1];
  if (!p) return;
  candies.push({ x: p.x + 20 + Math.random() * (p.w - 40), y: p.y - 28, collected: false });
}

function spawnCottonCandy() {
  const p = platforms[Math.floor(Math.random() * (platforms.length - 1)) + 1];
  if (!p) return;
  cottonCandies.push({ x: p.x + p.w / 2, y: p.y - 38, collected: false });
}

function drawCandies() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  candies.forEach(c => {
    if (c.collected) return;
    ctx.font = '24px serif';
    ctx.fillText('🍭', c.x, c.y);
  });
  cottonCandies.forEach(c => {
    if (c.collected) return;
    ctx.shadowColor = PINK;
    ctx.shadowBlur = 18;
    ctx.font = '28px serif';
    ctx.fillText('🩷', c.x, c.y);
    ctx.shadowBlur = 0;
  });
}

// ---- PONY ----
function drawPony() {
  if (pony.dead) { drawDeadPony(); return; }
  ctx.save();
  ctx.translate(pony.x + pony.w / 2, pony.y + pony.h / 2);
  const bob = pony.onGround ? Math.sin(frame * 0.3) * 2 : 0;
  ctx.translate(0, bob);

  // body
  ctx.fillStyle = '#ffb6c1';
  ctx.shadowColor = HOT_PINK;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.ellipse(0, 6, 22, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // head
  ctx.beginPath();
  ctx.arc(-12, -8, 14, 0, Math.PI * 2);
  ctx.fill();

  // horn
  ctx.fillStyle = '#ffe0f0';
  ctx.shadowColor = '#ffaaff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(-18, -20); ctx.lineTo(-12, -37); ctx.lineTo(-6, -20);
  ctx.closePath();
  ctx.fill();

  // mane
  ctx.fillStyle = '#e91e8c';
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(-8, -15, 8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -13, 6, 0, Math.PI * 2); ctx.fill();

  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-16, -10, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a0030';
  ctx.beginPath(); ctx.arc(-15, -10, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-14, -11, 1, 0, Math.PI * 2); ctx.fill();

  // legs
  const la = pony.onGround ? Math.sin(frame * 0.4) * 8 : 0;
  ctx.fillStyle = '#ffb6c1';
  ctx.shadowColor = HOT_PINK;
  ctx.shadowBlur = 4;
  ctx.fillRect(8, 12, 7, 14 + la);
  ctx.fillRect(16, 12, 7, 14 - la);
  ctx.fillRect(-18, 8, 7, 14 - la);
  ctx.fillRect(-10, 8, 7, 14 + la);

  // tail
  ctx.strokeStyle = '#e91e8c';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.shadowColor = HOT_PINK;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(22, 0);
  ctx.quadraticCurveTo(34 + Math.sin(frame * 0.2) * 5, -10 + Math.cos(frame * 0.15) * 8, 28 + Math.sin(frame * 0.3) * 3, 10);
  ctx.stroke();

  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawDeadPony() {
  pony.deathFrame++;
  ctx.save();
  ctx.translate(pony.x + pony.w / 2, pony.y + pony.h / 2);
  ctx.rotate(Math.min(pony.deathFrame * 0.1, Math.PI));
  ctx.globalAlpha = Math.max(0, 1 - pony.deathFrame / 55);
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath(); ctx.ellipse(0, 6, 22, 15, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-12, -8, 14, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ---- DEATH PARTICLES ----
function spawnDeathParticles() {
  for (let i = 0; i < 35; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 7 + 2;
    const isGore = Math.random() < 0.35;
    deathParticles.push({
      x: pony.x + pony.w / 2,
      y: pony.y + pony.h / 2,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 4,
      life: 70, maxLife: 70,
      color: isGore ? '#cc0000' : (Math.random() < 0.5 ? '#ff1493' : '#ffb6c1'),
      r: Math.random() * 6 + 2,
      emoji: Math.random() < 0.25 ? (Math.random() < 0.5 ? '💀' : '🩸') : null,
    });
  }
}

function updateDrawParticles() {
  deathParticles = deathParticles.filter(p => p.life > 0);
  deathParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.life--;
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.emoji) {
      ctx.font = '18px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, p.x, p.y);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
}

// ---- COLLISION ----
function checkPlatforms() {
  let onAny = false;
  const feet = pony.y + pony.h;
  const left = pony.x + 10, right = pony.x + pony.w - 10;

  for (const p of platforms) {
    if (pony.vy >= 0 && feet >= p.y && feet <= p.y + 12 && right > p.x && left < p.x + p.w) {
      pony.y = p.y - pony.h; pony.vy = 0; pony.onGround = true; pony.jumps = 0;
      onAny = true; break;
    }
  }

  if (!onAny && bridgeActive) {
    for (let i = 0; i < platforms.length - 1; i++) {
      const a = platforms[i], b = platforms[i + 1];
      const gapX = a.x + a.w, gapW = b.x - gapX;
      if (gapW > 0 && pony.vy >= 0 && feet >= a.y && feet <= a.y + 12 && right > gapX && left < gapX + gapW) {
        pony.y = a.y - pony.h; pony.vy = 0; pony.onGround = true; pony.jumps = 0;
        onAny = true; break;
      }
    }
  }

  if (!onAny) pony.onGround = false;
}

function checkFallen() {
  if (pony.y > canvas.height + 60 && !pony.dead) {
    pony.dead = true;
    spawnDeathParticles();
    if (score > highScore) highScore = score;
  }
}

function checkCollect() {
  const cx = pony.x + pony.w / 2, cy = pony.y + pony.h / 2;
  candies.forEach(c => {
    if (c.collected) return;
    if (Math.hypot(cx - c.x, cy - c.y) < 28) { c.collected = true; score += 10; }
  });
  cottonCandies.forEach(c => {
    if (c.collected) return;
    if (Math.hypot(cx - c.x, cy - c.y) < 32) {
      c.collected = true; score += 50;
      bridgeActive = true; bridgeTimer = BRIDGE_DURATION;
    }
  });
}

// ---- JUMP / RESET ----
function jump() {
  if (state === 'start' || state === 'dead') { resetGame(); return; }
  if (pony.onGround || pony.jumps < 1) {
    pony.vy = -12; pony.onGround = false; pony.jumps++;
  }
}

function resetGame() {
  state = 'playing'; score = 0; frame = 0; speed = 4;
  bridgeActive = false; bridgeTimer = 0;
  Object.assign(pony, { x: 80, y: 200, vy: 0, onGround: true, jumps: 0, dead: false, deathFrame: 0 });
  deathParticles = []; candies = []; cottonCandies = [];
  initPlatforms();
  for (let i = 0; i < 5; i++) spawnCandy();
}

// ---- BACKGROUND ----
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0d0020');
  grad.addColorStop(0.65, '#1a0040');
  grad.addColorStop(1, '#2a0055');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = 0.07;
  ctx.fillStyle = '#ff69b4';
  ctx.beginPath(); ctx.ellipse(100 + Math.sin(frame * 0.004) * 20, 80, 130, 60, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(370 + Math.cos(frame * 0.006) * 15, 110, 100, 50, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

// ---- BRIDGE TIMER BAR ----
function drawBridgeBar() {
  if (!bridgeActive) return;
  const ratio = bridgeTimer / BRIDGE_DURATION;
  ctx.fillStyle = 'rgba(255,105,180,0.25)';
  ctx.fillRect(10, canvas.height - 22, (canvas.width - 20) * ratio, 12);
  ctx.strokeStyle = PINK;
  ctx.lineWidth = 2;
  ctx.strokeRect(10, canvas.height - 22, canvas.width - 20, 12);
  ctx.fillStyle = '#fff';
  ctx.font = '9px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🩷 BRIDGE ACTIVE', canvas.width / 2, canvas.height - 16);
}

// ---- SCREENS ----
function drawStartScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.textAlign = 'center';
  ctx.shadowColor = HOT_PINK;
  ctx.shadowBlur = 22;
  ctx.fillStyle = PINK;
  ctx.font = 'bold 34px Arial';
  ctx.fillText('✨ COSMIC CUTIE RUN ✨', canvas.width / 2, 95);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '16px Arial';
  ctx.fillText('Tap or press SPACE to start', canvas.width / 2, 150);
  ctx.fillStyle = '#ffb6c1';
  ctx.font = '13px Arial';
  ctx.fillText('Jump over pits — collect 🍭 for points', canvas.width / 2, 185);
  ctx.fillText('Rare 🩷 cotton candy = bridge power!', canvas.width / 2, 210);
}

function drawGameOverScreen() {
  if (pony.deathFrame < 28) return;
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff1493';
  ctx.font = 'bold 32px Arial';
  ctx.fillText('💀 SHE FELL! 💀', canvas.width / 2, 100);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '20px Arial';
  ctx.fillText(`Score: ${score} 🍭`, canvas.width / 2, 148);
  ctx.fillText(`Best: ${highScore} 🍭`, canvas.width / 2, 178);
  ctx.fillStyle = '#ffb6c1';
  ctx.font = '15px Arial';
  ctx.fillText('Tap to try again!', canvas.width / 2, 220);
}

// ---- MAIN LOOP ----
function update() {
  if (state !== 'playing') return;
  frame++;

  // medium difficulty ramp
  speed = 4 + Math.min(frame / 1500, 4.5);

  platforms.forEach(p => p.x -= speed);
  candies.forEach(c => c.x -= speed);
  cottonCandies.forEach(c => c.x -= speed);

  platforms = platforms.filter(p => p.x + p.w > -60);
  candies = candies.filter(c => c.x > -60);
  cottonCandies = cottonCandies.filter(c => c.x > -60);

  const last = platforms[platforms.length - 1];
  if (last && last.x + last.w < canvas.width + 200) {
    spawnPlatform();
    if (Math.random() < 0.72) spawnCandy();
    if (Math.random() < 0.05) spawnCottonCandy(); // rare!
  }

  if (frame % 60 === 0) score++;

  if (bridgeActive) { bridgeTimer--; if (bridgeTimer <= 0) bridgeActive = false; }

  pony.vy += 0.6;
  pony.y += pony.vy;

  checkPlatforms();
  checkFallen();
  checkCollect();

  if (pony.dead) {
    state = 'dead';
    if (score > highScore) highScore = score;
  }

  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('highScore').textContent = highScore;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawStars();
  drawBridges();
  drawPlatforms();
  drawCandies();
  drawPony();
  updateDrawParticles();
  drawBridgeBar();
  if (state === 'start') drawStartScreen();
  if (state === 'dead') drawGameOverScreen();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// ---- INPUT ----
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
canvas.addEventListener('mousedown', () => jump());

// ---- START ----
initStars();
loop();
</script>
</body>
</html>
